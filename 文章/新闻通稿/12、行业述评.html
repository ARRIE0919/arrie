                  <h1 class="display-4" style="font-size: 2rem; margin-bottom: 3.5rem;">跪舔欧血当休?/h1>
                </div>

        <div class="article-content" data-aos="fade-up">
          <div class="row mb-8">
            <div class="col-lg-12">
              <!-- 文章内容 -->
                <div class="article-body">
<p style="font-size: 1.1rem; text-align: center;">—?022年巴塞罗那国际赛新王“蓝夜”拒售引发的思?/p>
            <br>
<img src="/../作品?1.文字/4.新闻通稿/新闻12.png" alt="跪舔欧血当休? class="img-fluid mb-4">
            <br>
            <br>
            <p style="font-size: 1.1rem;">长久以来，国内鸽界对欧洲血统的赛鸽有莫名其妙的推崇和膜拜。譬如夸赞赛鸽体质优良，莫不将其血统追溯至某欧赛冠军或（和）某欧洲名家的黄金配对绝不罢休；谈及优质幼鸽的培育，除了简单粗暴地从欧洲重金引进配种便少有他法?/p>
            <p style="font-size: 1.1rem;">在过去的几十年里，欧洲鸽友乐得把比赛高位鸽高价出售给我们，我们也乐得当人傻钱多的“冤大头”。即使现在，中国鸽界仍未摆脱这种明显不健康的发展模式，热衷于从欧洲重金引种的鸽友仍大有人在?/p>
            <p style="font-size: 1.1rem;">为何中国赛鸽界会有如此严重的“崇洋媚外”和“拿来主义”呢？最近发生的一件事，再次迫使笔者思考这一问题，而其症结所在和破局之法都指向两个字——赛制?/p>
            <p style="font-size: 1.1rem;">7月，欧洲信鸽比赛中空距最长的传奇赛事——巴塞罗那国际赛闭幕。来自比利时、荷兰、法国、德国、英国、卢森堡六国?6897羽参赛鸽，于7?日早?:00从西班牙巴塞罗那起飞，北上穿越了法国境内大范围的强劲北风后，于次日早喜迎见鸽?/p>
            <p style="font-size: 1.1rem;">比利时全国冠军、同时也是国际总冠军，由比利时德尔霍夫－帕斯曼斯医师团队夺得。他?岁黄眼灰雌“蓝夜”（Blue Night）BE19-1067685，于9日早7:10:30踏钟夺冠，空?014公里、平均分?98.40 ?分?/p>
            <p style="font-size: 1.1rem;">新王诞生，各方瞩目。大家注意到，直到“蓝夜”踏?个多小时后，比利时其他选手才陆续迎来到鸽，“蓝夜”在长距离、逆风下的竟翔能力因此备受赞誉。而且大家深挖其血统后发现，其同时继承了“米歇尔”和“米洛斯”两大超级血脉注，这下更是热议不断，而很多国内鸽友第一时间想到的就是，如何将其引入国内。但人家鸽主阿兰·德尔霍夫表示：“不卖。要一堆钱有什么用？让她作为一羽种鸽，去再次证明自己吧。?/p>
            <p style="font-size: 1.1rem;">这无疑有些被打脸。但回过头反思，为什么国内鸽友看到欧洲高位鸽的第一反应总是引进？为什么我们提升赛鸽质量总少不了欧血掺入？难道仅仅是因为盲目跟风的“崇洋”思想和商业炒作吗？答案恐怕就是最坏的那个——欧血赛鸽在某些方面，的确优于国内赛鸽?/p>
            <p style="font-size: 1.1rem;">何以出此“大逆不道”之言？拿欧洲四大赛事之一的巴塞罗那国际赛来看，今年的参赛总羽?6897羽，其中比利?549羽、荷?905羽、法?123羽、德?056羽、英?21羽、卢森堡43羽，六个国家加起来的总羽数不及国内一家大公棚的收鸽羽数，英国、卢森堡的参赛羽数更是不及国内一个大户在公棚的交鸽羽数。拿鸽友数量来看，我国鸽友数量是整个欧洲的两倍不止；拿赛鸽数量来看，中鸽协每年发放足环超3000万枚，更是占据世界总量?0%以上；就赛线而言，我国幅员辽阔，赛线涵盖了各种地势地形和气候类型，难度等级有过之而无不及。占据如此人和地利，那为何还总让欧洲赛鸽压我们一头呢?/p>
            <p style="font-size: 1.1rem;">答案就出在赛制上。长距离成鸽比赛的没落，是造成国内赛鸽素质退化的主要原因?/p>
            <p style="font-size: 1.1rem;">为什么说长距离、成鸽赛制才能诞生真正的优质赛鸽？长距离考验的是赛鸽的速度、耐力、稳定性、导航能力、恶劣天气对抗能力等多方面的综合能力，而国内现在盛行的短平快赛制，着重考验赛鸽的速度，对耐力、稳定性、远距导航能力等方面的考验相对薄弱；成鸽赛制则需要赛鸽在不同年龄阶段都参加比赛，在时间维度上从整个竞赛生涯，综合评估赛鸽的竞翔能力，而短平快赛制只考验赛鸽一岁时的竞翔能力，局限性明显。通过长距离成鸽赛汰选出的高位鸽优势明显，这也是无论超远程还?00公里的参赛鸽友，都将其作为引种首选的原因?/p>
            <p style="font-size: 1.1rem;">既然如此，为何国内还如此流行短平快赛制呢？因为短平快赛制更适合商业运作。在此赛制下，组织方和参赛方投入的精力明显减少，比赛周期大幅缩短，变现周期即围绕着一只鸽子的参赛交费、明暗指定、奖金发放、拍卖出售等高额的资金流通在几个月内就可以完成。而长距离成鸽赛制下，一羽鸽子的饲养和变现周期少则两年，多则六七年，欧洲甚至出现过“巴塞罗那七届老将”的梅尔浪传奇，这是国内急功近利的部分鸽友远不能接受的?/p>
            <p style="font-size: 1.1rem;">赛鸽商业化并非坏事，但因此造成的长距离成鸽赛制的缺失显然是偏离了正确航向。在现今世界鸽坛，欧洲赛鸽以五大国际赛主导锻造出的高品质赛鸽占据金字塔尖，成为优质赛鸽的产出者，出售赛鸽是其主要盈利模式。我们的赛制无法诞生高水平的赛鸽，想赢钱又离不开高品质赛鸽，被迫处于赛鸽商业产业链的下游，成了钱多人傻的消费者。这是国内鸽界“崇洋媚外”和“拿来主义”根深蒂固、积重难返的根本原因。在这个过程中，我们引入了赛鸽，流失了财富，掏钱的是强豪大户，但最终真正为欧洲赛鸽买单的，还是国内的普通鸽友。国内鸽友交钱参赛，这些财富集中到少数人手里，一部分成为其资本累积，一部分流入了欧洲人的口袋，这就是掩盖在当今国内赛鸽繁荣面貌下的残酷本质?/p>
            <p style="font-size: 1.1rem;">如何打破这一局面？在笔者之前，鸽界早有有识之士奔走呼吁：赛制的改变是破局之本。这有赖于正确竞翔观的重新树立（要还赛鸽运动以竞技体育的本来面貌，不要让其沦为资本牟利的冰冷工具），依托于中鸽协相关政策的出台和指导，需要赛事组织方规程和奖金的合理引导，成型于鸽界媒体在世界鸽坛的宣传报道。只有通过长距离成鸽赛制提升赛鸽品质，进而在世界鸽坛塑造中国赛鸽名家和铭鸽，转赛鸽进口为出口，才是我国赛鸽行业健康可持续化发展的优选之路?/p>
            <p style="font-size: 1.1rem;">当然，要想让中国赛鸽像欧洲赛鸽一样，在世界鸽坛占据一席之地，除了赛制的转型，与国际赛鸽接轨、走出国门参赛也是途径之一。比如开尔鸽业走出国门的欧战军团，就在欧洲为祖国争得了不少荣誉。而且庆幸的是，像这样心怀大志的鸽友，正在越来越多?/p>
            <br>
            <p style="font-size: 0.8rem; font-style: italic;">注：“蓝夜”的父亲“蓝香奈儿?Blue Chane)?017年欧洲雌鸽王亚军“米洛斯小姐”的近亲子代，而“米洛斯小姐”的父亲就是大名鼎鼎的超级种公“米洛斯”（Milos）NL02-2350928。“米洛斯”家族是著名的早熟超长距离鸽系，后裔佳绩频出，堪称众多欧洲强豪获胜背后的秘密武器。但不幸的是，“米洛斯”本尊已于今?月份去世，此番“蓝夜”在本届巴塞罗那国际赛中重现了祖父“米洛斯”当年在蒙托邦国家赛上一枝独秀的精彩表现，也算是从侧面表明，其完美传承了祖父的优秀血脉?/p>
            <p style="font-size: 0.8rem; font-style: italic;">“蓝夜”的母亲则是荷兰超长距离名家柯尔·海德大名鸽“米歇尔”的孙女。“米歇尔”既是超级赛鸽，又是超级种鸽，曾获得1999-2001年波品纳ZLU全国鸽王冠军、达克斯ZLU全国鸽王冠军，作育孙代获?008年国际长距离鸽王冠军?/p>
