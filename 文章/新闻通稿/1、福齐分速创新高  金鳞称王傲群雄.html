                  <h1 class="display-4" style="font-size: 2rem; margin-bottom: 3.5rem;">зҰҸйҪҗеҲҶйҖҹеҲӣж–°й«ҳ  йҮ‘йіһз§°зҺӢеӮІзҫӨйӣ?/h1>

          <div class="row mb-8">
            <div class="col-lg-12">
              <!-- ж–Үз« еҶ…е®№ -->
                <div class="article-body">
<p style="font-size: 1.1rem; text-align: center;">вҖ”вҖ”зҰҸйҪҗеҶіиөӣиҜһз”ҹеҺҶеҸІжңҖй«ҳеӣӣе…із»јеҗҲеҲҶйҖ?420зұ?еҲҶгҖ?/p>
            <p style="font-size: 1.1rem; text-align: center;">йҮ‘йіһз§ҚеӯҗйғЁиҗҪеҢ…жҸҪз¬¬еӣӣе…іеҶ еҶӣе’Ңеӣӣе…із»јеҗҲйёҪзҺӢжҖ»еҶ еҶ?/p>
            <br>
            <p style="font-size: 1.3rem; text-align: center; font-weight: bold;">е°ҸйӣӘиҠӮиҮіжҲҳйј“ж“ӮпјҢзҰҸйҪҗж–°д№ЎеҚғзҫҪйЈһгҖӮйҷҚжё©йЎәйЈҺйҪҗеҠ©йҳөпјҢеҚ…дә”еӣўйҳҹдә®й”ӢеҲғгҖ?/p>
            <p style="font-size: 1.3rem; text-align: center; font-weight: bold;">жІіеұұй”Ұз»ЈдёҮйҮҢжҷҙпјҢжҢҜзҝ…еҰӮжҺЈеҗ‘еҚ—иЎҢгҖӮеҲҶйҖҹж–°й«ҳд№ҫеқӨе®ҡпјҢйҮ‘йіһз§°зҺӢжҠҠеҗҚиҶәгҖ?/p>
            <br>
<img src="../../дҪңе“Ғйӣ?1.ж–Үеӯ—/4.ж–°й—»йҖҡзЁҝ/ж–°й—»1.png" alt="зҰҸйҪҗеҲҶйҖҹеҲӣж–°й«ҳ  йҮ‘йіһз§°зҺӢеӮІзҫӨйӣ? class="img-fluid mb-4">
            <br>
            <br>
            <p style="font-size: 1.1rem;">2021е№ҙвҖңдё–з•ҢжқҜвҖқдҝЎйёҪиҒҢдёҡиҒ”иөӣпјҲзҰҸйҪҗз«ҷпјүзҰҸйҪҗеӣҪйҷ…зқҝзҝ”жқ‘йӣ„й№°еӣӣе…із«һиөӣпјҢдә?1жң?2ж—Ҙе°ҸйӣӘиҠӮж°”еҪ“еӨ©пјҢеңЁжІіеҚ—зңҒж–°д№ЎеёӮжү“е“Қз¬¬еӣӣе…із»ҲжһҒеҜ№еҶіпј?20е…¬йҮҢдёҖи·ҜеӨ©жҷҙйЈҺйЎәпјҢ947зҫҪиөӣйёҪж¬ўж¬Јз•…йЈһпјҢеӣӣе…ійёҪзҺӢз»јеҗҲеҲҶйҖ?420.908002455990еҲӣдёӢзҰҸйҪҗеҢ—зәҝжңүеҸІд»ҘжқҘзҡ„еҺҶеҸІж–°й«ҳпјҲ2019е№ҙдёә1387.401628081970зұ?еҲҶпјҢ2020е№ҙдёә1333.966601841850зұ?еҲҶпјүгҖҒеҶ еҶӣйёҪеҲҶйҖ?659.7799пјҢеҪ“ж—ҘеҪ’89.44%пјҢд»ҘеңҶж»Ўд№Ӣе§ҝе®Је‘ҠпјҢжң¬е№ҙеәҰйҫҷдәүиҷҺж–—е°ҳеҹғиҗҪе®ҡгҖ?/p>
            <p style="font-size: 1.1rem;">йҷўеҶ…6еҸ·жЈҡйҮ‘йіһз§ҚеӯҗйғЁиҗҪжҲҗдёәд»Ҡе№ҙзҰҸйҪҗз§ӢиөӣйЈҺеӨҙж— дҝ©зҡ„вҖңзҺӢиҖ…ж‘ҮзҜ®вҖқпјҢдёҚд»…еҪ’е·ўзҫҪж•°еңЁйҷўеҶ?2дёӘеҸӮиөӣеӣўйҳҹдёӯеҗҚеҲ—еүҚиҢ…пјҢжңҖз»ҲжҺ’еҗҚиҝҳжңӘзЎ®е®ҡе°ұе·Іеҹәжң¬й”Ғе®ҡйҮ‘зүҢж•ҷз»ғз¬¬дёҖеҗҚпјҢиҖҢдё”еҪ’е·ўйёҪй«ҳдҪҚжҲҗз»©дј—еӨҡе…іе…ійғҪжңүеүҚ10еҗҚпјҢз¬¬еӣӣе…іеҶ еҶӣе’Ңеӣӣе…із»јеҗҲйёҪзҺӢзҡҶеҮәиҮӘе…¶еёҗдёӢпјҢзҺӢеҫ·еҗҲпјӢзҪ—еҫ·дҪңиӮІзҡ„CHN2021-99-0000826еҘӢиө·зӣҙиҝҪпјҢд»Ҙй»‘й©¬д№Ӣе§ҝзӘҒйҷҚз¬¬еӣӣе…іеҲҶйҖҹжҰңеҚ•д№ӢжңҖпјҢиҚЈиҺ·з¬¬еӣӣе…іеҶ еҶӣгҖӮзҺӢеҫ·еҗҲпјӢйЎ№йӘҘзҝ”дҪңиӮІзҡ„CHN2021-99-0000841дёҖи·ҜиҝҮе…іж–©е°ҶпјҢеңЁеӣӣе…із»јеҗҲжҺ’еҗҚзҡ„жҝҖзғҲз«һдәүдёӯеҚ«еҶ•жҲҗеҠҹпјҢиҺ·е°Ғе№ҙеәҰйёҪзҺӢжҖ»еҶ еҶӣгҖ?/p>
            <p style="font-size: 1.1rem;">жҲҗз«Ӣдә?009е№ҙгҖҒйҡ¶еұһдәҺзҰҸйҪҗеӣҪйҷ…йӣҶеӣўзҡ„жӯҰжұүзҰҸйҪҗиөӣйёҪдҝұд№җйғЁиө„йҮ‘йӣ„еҺҡгҖҒз»„иөӣдёүе…¬пјҢжҳҜйёҪеҸӢдҝЎиө–е’Ңе–ңзҲұзҡ„еӣҪеҶ…й«ҳз«ҜиөӣйёҪе№іеҸ°гҖ?021е№ҙпјҢзҰҸйҪҗе–ңзәіеӣҪеҶ…35е®¶иөӣйёҪејәиұӘеҗҢеңәйҖҗй№ҝпјҢе…ұи®Ўе”®зҺ?370жһҡпјҢжҲҳиҮіз¬¬еӣӣе…іеҸӘеү?47зҫҪпјҢдёүе…іж·ҳжұ°зҺҮй«ҳиҫ?2.36%гҖ?/p>
            <p style="font-size: 1.1rem;">зәөз„¶жҜ”иөӣйҡҫеәҰеҰӮжӯӨд№Ӣй«ҳпјҢдәҰжңүж— ж•°йёҪеҸӢд№җжӯӨдёҚз–ІпјҢеҸҜи§ҒиҒҢдёҡиөӣдәӢзҡ„ж¬ІзҪўдёҚиғҪе’ҢзҰҸйҪҗиөӣйёҪдҝұд№җйғЁзҡ„йӯ…еҠӣд№ӢеӨ§гҖӮиҒҢдёҡиөӣдәӢе…ід№ҺзғӯзҲұпјҢжӣҙе…ід№ҺиҚЈиҖҖпјҢе·Із»ҸйҖҗжёҗжҲҗдёәеӨҡж•°зІҫиӢұйёҪеҸӢзҡ„з»ҲжһҒиҝҪжұӮгҖ?/p>

            <p style="font-size: 1.1rem;">дёңз»Ҹ113В°59вҖ?3вҖіпјҢеҢ—зә¬35В°16вҖ?5вҖізҡ„жІіеҚ—зңҒж–°д№ЎеёӮзәўж——еҢәе°Ҹеә—й•ҮиөөжҘји·Ҝж—Ғзҡ„дёҖеӨ„ж—·йҮҺпјҢжҳҜжң¬ж¬ЎеҶіиөӣзҡ„еҸёж”ҫең°гҖ?1жң?2ж—?зӮ?0еҲҶпјҢж°”жё©0в„ғпјҢиҘҝеҢ—йЈ?зә§пјҢе°ҸйёҪеӯҗд»¬и„ұз¬јиҖҢеҮәпјҢжҜ«дёҚзӣҳж—ӢпјҢеҫ„зӣҙеҗ‘еҚ—пјҢд»ҘжҳӮжү¬е§ҝжҖҒдёҠжј”дёҖеңәйҖҹеәҰдёҺжҝҖжғ…зҡ„жҗҸжқҖгҖ?/p>

            <p style="font-size: 1.1rem; text-align: center; font-weight: bold;">2021е№ҙвҖңдё–з•ҢжқҜвҖқдҝЎйёҪиҒҢдёҡиҒ”иөӣпјҲзҰҸйҪҗз«ҷпјүзҰҸйҪҗеӣҪйҷ…зқҝзҝ”жқ‘йӣ„й№°еӣӣе…із«һиөӣз¬¬еӣӣе…іеҘ–йҮ‘</p>

            <div class="table-responsive" style="overflow-x: auto;"><table class="table table-bordered" style="font-size: 11px; word-break: break-word;"><tr><td style="padding: 8px; border: 1px solid #ddd;">еҶ еҶӣ</td><td style="padding: 8px; border: 1px solid #ddd;">дәҡеҶӣ</td><td style="padding: 8px; border: 1px solid #ddd;">еӯЈеҶӣ</td><td style="padding: 8px; border: 1px solid #ddd;">4-10еҗ?/td><td style="padding: 8px; border: 1px solid #ddd;">11-50еҗ?/td><td style="padding: 8px; border: 1px solid #ddd;">51-319еҗ?/td></tr><tr><td style="padding: 8px; border: 1px solid #ddd;">100дё?/td><td style="padding: 8px; border: 1px solid #ddd;">50дё?/td><td style="padding: 8px; border: 1px solid #ddd;">30дё?/td><td style="padding: 8px; border: 1px solid #ddd;">еҗ?5дё?/td><td style="padding: 8px; border: 1px solid #ddd;">еҗ?дё?/td><td style="padding: 8px; border: 1px solid #ddd;">еҗ?дё?/td></tr></table></div>

            <p style="font-size: 1.1rem;">з¬¬еӣӣе…іеҶ еҶӣпјҡйҷўеҶ…6еҸ·жЈҡйҮ‘йіһз§ҚеӯҗйғЁиҗҪиҝҺжқҘе…Ёеңәз¬?зҫҪиёҸй’ҹйёҪпјҢжҳҜзҺӢеҫ·еҗҲпјӢзҪ—еҫ·дҪңиӮІзҡ„CHN2021-99-0000826пјҢиёҸй’ҹж—¶й—?2:43:33пјҢиҺ·еҫ—жңҖй«ҳеҲҶйҖ?659.7799пјҢеҖҹжӯӨеңЁз«һдәүжҝҖзғҲзҡ„жҺ’еҗҚдёӯзЁіеқҗеҶ еҶӣе®қеә§гҖӮиҝҷзҫҪиөӣйёҪиө„ж јиөӣ2276еҗҚпјҢз¬¬дёҖе…?557еҗҚпјҢз¬¬дәҢе…?67еҗҚпјҢз¬¬дёүе…?07еҗҚпјҢз»ҲдәҺеңЁз¬¬еӣӣе…ійҖҶиўӯжҲҗеҠҹпјҢеҸҜи°“з¬¬еӣӣе…ізҡ„жңҖејәй»‘й©¬гҖ?/p>
            <p style="font-size: 1.1rem;">з¬¬еӣӣе…ідәҡеҶӣпјҡе‘ЁиһҚпјӢжқҺеҗ‘дёңдҪңиӮІзҡ„CHN2021-99-0003791дә?2:44:04з¬?зҫҪиёҸе“ҚйёҪй’ҹпјҢиҝҷзҫҪжқҘиҮӘйҷўеӨ–11еҸ·жЈҡе‘ЁиһҚзҰҸе»әйҷҲжё…зҡ„иөӣйёҪпјҢеҮӯеҖҹжӣҙй•ҝз©әи·қе°ҶеҲҶйҖҹжҸҗеҚҮиҮі1658.9636пјҢе–ңжҸҗз¬¬еӣӣе…ідәҡеҶӣгҖ?/p>
            <p style="font-size: 1.1rem;">з¬¬еӣӣе…іеӯЈеҶӣпјҡCHN2021-99-0001876дә?2:43:44з¬?зҫҪиёҸе“ҚйёҪй’ҹпјҢз”ұжқЁйёЈпјӢиғЎе‘Ёжқ°дҪңиӮІпјҢеҜ„е…»еңЁйҷўеҶ?2еҸ·жЈҡеҗүзҘҘйёҪиҲҚпјҢд»ҘеҲҶйҖ?658.5498иҺ·еҫ—з¬¬еӣӣе…іеӯЈеҶӣгҖ?/p>
            <p style="font-size: 1.1rem;">з¬¬дёҖжўҜйҳҹ6зҫҪиөӣйёҪдёӯеү©дҪҷзҡ?зҫҪжңҖеҗҺзҡҶиҺ·еҫ—з¬¬еӣӣе…іеүҚ10зҡ„жҲҗз»©гҖӮзҙ§йҡҸе…¶еҗҺзҡ„з¬¬дәҢжўҜйҳҹгҖҒз¬¬дёүжўҜйҳҹгҖҒз¬¬NжўҜйҳҹжҺҘиҝһжҠҘиҝӣпјҢдҝұд№җйғЁж°”ж°ӣйҖҗжёҗиҝӣе…Ҙй«ҳжҪ®гҖӮи§Ғйё?е°Ҹж—¶еҶ…еҲ°йёҪзҫҪж•°дёә770зҫҪпјҢиҫҫеҲ°дәҶдёҠз¬јзҫҪж•°зҡ„81.31%гҖ?/p>

            <p style="font-size: 1.1rem;">еҲ?1жң?2ж—ҘжҷҡпјҢйҮ‘зүҢж•ҷз»ғзҡ„жҺ’еҗҚиҝҳеңЁз»§з»ӯжҺҘж”¶дёӯпјҢжңҖз»ҲжҺ’еҗҚиҝҳжңӘжҸӯжҷ“гҖӮдҪҶд»Һзӣ®еүҚеҪ’е·ўж•°жҚ®зңӢпјҢйҮ‘йіһз§ҚеӯҗйғЁиҗҪиҝҷйў—з§ҚеӯҗжңүжңҖеӨ§жҰӮзҺҮзңҹзҡ„еӯөеҢ–еҮә2021е№ҙзҡ„йҮ‘зүҢж•ҷз»ғгҖ?/p>
            <p style="font-size: 1.1rem;">еҸёж”ҫеҪ“еӨ©пјҢжңүж јеҪ’е·?47зҫҪпјҢжңүж јеҪ’е·ўзҺ?9.44%гҖӮзҰҸйҪҗиөӣдәӢеҗ‘жқҘд»Ҙй«ҳеҲҶйҖҹи‘—з§°пјҢ2019е№ҙзҰҸйҪҗз¬¬дёүе…і560е…¬йҮҢй№ӨеЈҒжҲҳпјҢжӣҫдёҠжј”еҶ еҶӣйёҪ1851зұ?еҲҶгҖҒеүҚ6еҗҚе…ЁйғЁи¶…иҝ?800зұ?еҲҶзҡ„еҪ’е·ўзҘһиҜқгҖӮз¬¬еӣӣе…іеҶ еҶӣйёҪйЈҺйҖ?659.7799пјҢеҶҚж¬ЎйЈһеҮәй«ҳеҲҶйҖҹпјҢеӣӣе…із»јеҗҲеҲҶйҖ?420.908002455990жӣҙжҳҜжү“з ҙзҰҸйҪҗеҢ—зәҝжңүеҸІд»ҘжқҘзҡ„еҺҶеҸІжңҖй«ҳи®°еҪ•гҖ?/p>

            <p style="font-size: 1.1rem;">2022е№ҙпјҢзҰҸйҪҗе°ҶеҶҚиҝҺжқҘеӣҪеҶ…4еӨ§йЎ¶е°–иөӣйёҪеӣўйҳҹејәеҠҝе…Ҙй©»пјҢеҲҶеҲ«жҳҜдёңзӣҹеӣҪйҷ…гҖҒй•ҝеҹҺйёҪдёҡгҖҒйҷ•иҘҝеҚҡеҚҡйёҪдёҡгҖҒй”ҰеӣӯйёҪдёҡпјҢеұҠж—¶йҷўеҶ…еӣўйҳҹе°ҶеўһиҮ?6е®¶пјҢиөӣдәӢжҝҖзғҲзЁӢеәҰеҶҚж¬ЎеҚҮзә§гҖӮйёҪеҸӢд»¬е°ҪеҸҜд»ҘжқҘзҰҸйҪҗеӨ§иөӣеңәпјҢиҺ«иҰҒй”ҷиҝҮдёҺиҝҷдәӣй«ҳжүӢејәиұӘдёҖиҫғй•ҝзҹӯзҡ„жңәдјҡгҖ?/p>
