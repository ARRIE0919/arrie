          <script>
            // 添加鼠标悬停放大和加粗效?
            document.addEventListener('DOMContentLoaded', function() {
              // 获取元素
              const phoneIcon = document.getElementById('phone-icon');
              const wechatIcon = document.getElementById('wechat-icon');
              const emailIcon = document.getElementById('email-icon');
              const twLink = document.getElementById('tw-link');
              const emailLink = document.getElementById('email-link');
              
              // 设备检测函?
              function isMobileDevice() {
                return (typeof window.orientation !== 'undefined') || (navigator.userAgent.indexOf('IEMobile') !== -1);
              }
              
              // 为电话图标添加设备检测点击事?
              phoneIcon.addEventListener('click', function(e) {
                if (!isMobileDevice()) {
                  e.preventDefault(); // 阻止默认行为
                  alert('请用手机拨打'); // 显示提示信息
                }
                // 移动设备上保持默认行?
              });
              
              // 为所有图标添加悬停效果，放大并加粗图标本?
              [phoneIcon, wechatIcon, emailIcon].forEach(icon => {
                // 设置初始样式
                icon.style.transition = 'transform 0.3s ease-out';
                icon.style.display = 'inline-block';
                
                // 鼠标进入事件
                icon.addEventListener('mouseenter', function() {
                  this.style.transform = 'scale(1.2)';
                });
                
                // 鼠标离开事件
                icon.addEventListener('mouseleave', function() {
                  this.style.transform = 'scale(1)';
                });
              });
              
              // 为T/W文本添加悬停效果，触发电话和微信图标放大
              twLink.style.cursor = 'default'; // 恢复默认光标
              
              // 鼠标进入T/W文本时，放大电话和微信图?
              twLink.addEventListener('mouseenter', function() {
                phoneIcon.style.transform = 'scale(1.2)';
                wechatIcon.style.transform = 'scale(1.2)';
              });
              
              // 鼠标离开T/W文本时，恢复电话和微信图标大?
              twLink.addEventListener('mouseleave', function() {
                phoneIcon.style.transform = 'scale(1)';
                wechatIcon.style.transform = 'scale(1)';
              });
              
              // 为邮箱号添加悬停效果，触发邮箱图标放?
              emailLink.style.cursor = 'default'; // 设置默认光标
              
              // 鼠标进入邮箱号时，放大邮箱图?
              emailLink.addEventListener('mouseenter', function() {
                emailIcon.style.transform = 'scale(1.2)';
              });
              
              // 鼠标离开邮箱号时，恢复邮箱图标大?
              emailLink.addEventListener('mouseleave', function() {
                emailIcon.style.transform = 'scale(1)';
              });
              
              // 电话链接和邮箱地址的悬停效果已在CSS中定?
              
              // 为导航标签添加悬停放大加粗效?

                link.style.transition = 'transform 0.3s ease-out, font-weight 0.3s ease-out';
