<img src="/../作品?1.文字/7.歌词/7.就缠绕就赤裸.png" alt="就缠绕就赤裸" class="img-fluid mb-4">
            <br>
            <br>
            <br>

            <p style="font-size: 1.1rem;">要把亲爱的你遗忘在夕?/p>
            <p style="font-size: 1.1rem;">要把讨厌的你完整藏进胸膛</p>
            <p style="font-size: 1.1rem;">遥远的招? 是你?/p>
            <p style="font-size: 1.1rem;">那样? 微笑的你说着什么话</p>
            <br>
            <p style="font-size: 1.1rem;">要与你在秋天重逢多一?/p>
            <p style="font-size: 1.1rem;">要让花再生长再捧你住心上</p>
            <p style="font-size: 1.1rem;">看得见相? 再幸?/p>
            <p style="font-size: 1.1rem;">跳过? 才跑去吻你风尘仆?/p>
            <br>
            <p style="font-size: 1.1rem;">你说  世界就像巨大的游乐场</p>
            <p style="font-size: 1.1rem;">要记得彩虹雨涨都牵着你的手一起?/p>
            <p style="font-size: 1.1rem;">如果蜗居就缠绕就赤裸就彻夜聊梦想</p>
            <p style="font-size: 1.1rem;">像孩子一样分? 人间来过一?/p>
            <br>
            <p style="font-size: 1.1rem;">你说  第一场遇见傍晚的花房</p>
            <p style="font-size: 1.1rem;">还记得忧伤方糖都放进同一首歌里唱</p>
            <p style="font-size: 1.1rem;">渡过对江就风起就云去就交换你思绪</p>
            <p style="font-size: 1.1rem;">要与你相互调? 一生眉来又眼去</p>
            <br>
            <br>
            <p style="font-size: 1.1rem;">喜欢你不问过去就粘黏不离</p>
            <p style="font-size: 1.1rem;">花开了就香郁对望过就甜蜜</p>
            <p style="font-size: 1.1rem;">在有雨的夜里  偷吻?/p>
            <p style="font-size: 1.1rem;">让每? 稍纵即逝的光阴都美?/p>
            <br>
            <p style="font-size: 1.1rem;">你说  世界就是巨大的游乐场</p>
            <p style="font-size: 1.1rem;">要记得流浪绝望都握住你的手不能放</p>
            <p style="font-size: 1.1rem;">如果远行就水乡就月光就安静地遗忘</p>
            <p style="font-size: 1.1rem;">像孩子一样善? 忧伤容易遗忘</p>
            <br>
            <p style="font-size: 1.1rem;">你说  这一刻同样傍晚的花房</p>
            <p style="font-size: 1.1rem;">你多想忧伤方糖都放进同一首歌里唱</p>
            <p style="font-size: 1.1rem;">渡过对江就风起就云去就归还你思绪</p>
            <p style="font-size: 1.1rem;">要忘记夏天离? 然后形影不离</p>
            <br>
