            <p style="font-size: 1.1rem;">周一季风过境  拿错行李  湿头发的你啦</p>
            <p style="font-size: 1.1rem;">周二背包还你  旅行散心  是失恋的你吗</p>
            <p style="font-size: 1.1rem;">看这雨后彩虹  想他  想哭  想笑</p>
            <p style="font-size: 1.1rem;">不如留意  身边风景  季节时刻变化</p>
            <br>

            <p style="font-size: 1.1rem;">街角排队早餐  同个城市  茶厅煮花好吗</p>
            <p style="font-size: 1.1rem;">听你说起过去  失望  失恋  失落</p>
            <p style="font-size: 1.1rem;">我们太多  相同尴尬  话题却很融洽</p>
            <br>
            <p style="font-size: 1.1rem;">滴滴? 滴嗒  滴滴嗒嗒  滴嗒</p>
            <p style="font-size: 1.1rem;">你看窗外都下雨了  周天到没到呢</p>
            <p style="font-size: 1.1rem;">离开他吧  想要陪你我有说太多吗</p>
            <p style="font-size: 1.1rem;">虽然犯傻可是我很认真  这些  你都懂吧</p>
            <br>
            <p style="font-size: 1.1rem;">滴滴? 滴嗒  滴滴嗒嗒  滴嗒</p>
            <p style="font-size: 1.1rem;">你看深夜都下雨了  让我送你回家</p>
            <p style="font-size: 1.1rem;">如果累了  那就睡吧我在不要害?/p>
            <p style="font-size: 1.1rem;">赖在肩膀你再笑得太甜  我会  误会你呀</p>
            <br>
            <br>
            <p style="font-size: 1.1rem;">周四大雾降温  若会感冒  逛街你还去吗</p>
            <p style="font-size: 1.1rem;">周五什么共? 惹你失眠  彻夜陪你电话</p>
            <p style="font-size: 1.1rem;">在你心里某块  平庸  平凡  平淡</p>
            <p style="font-size: 1.1rem;">原来像我  从来不是  甘愿的愿望啊</p>
            <br>
            <p style="font-size: 1.1rem;">周六快递寄? 悲伤昨天  终于告别它吗</p>
            <p style="font-size: 1.1rem;">最近什么电? 虽然无聊  勉强陪你去吧</p>
            <p style="font-size: 1.1rem;">如果换我送花  放胆  放肆  放浪</p>
            <p style="font-size: 1.1rem;">喧闹繁华  世界很大  你想去哪里呀</p>
